# rocks.toml — NvPak Professional (Modern Zen 2026)

[rocks]

[plugins]
"rocks.nvim"            = "2.70.0"
"rocks-edit.nvim"       = "scm"
"rocks-treesitter.nvim" = "1.5.0"
"rocks-git.nvim"        = "2.7.0"
"rocks-config.nvim"     = "3.2.0"
tree-sitter-toml        = "0.0.31"
"lazydev.nvim"          = "scm"
"luvit-meta"            = "scm"
"nvim-web-devicons"     = "scm"
tree-sitter-python      = "scm"
"mini.nvim"             = "scm"

# Essential Themes (Verified Luarocks Names)
catppuccin              = "scm"
"onedarkpro.nvim"       = "scm"
"iceberg"               = { git = "https://github.com/cocopon/iceberg.vim", rev = "1.0^{}", version = "scm" }

# Modern Telescope (Minimal setup)
"telescope.nvim"           = "scm"
"telescope-ui-select.nvim" = "scm"

# Plugins with detailed configuration
[plugins."snacks.nvim"]
version = "scm"
config = "plugins.ui.snacks"

[plugins."blink.cmp"]
version = "scm"
config = "plugins.autocomplete.blink"

[plugins."mason-lspconfig.nvim"]
version = "scm"
config = "plugins.autocomplete.lspconfig"

[plugins."nvim-lspconfig"]
version = "scm"

[plugins."trouble.nvim"]
version = "scm"

[plugins."rocks-tui.nvim"]
git = "https://github.com/EvolveBeyond/rocks-tui.nvim"
version = "scm"
config = "plugins.ui.rocks-tui"

[bundles.lsp]
items = [ "lazydev.nvim", "luvit-meta", "blink.cmp" ]
config = "plugins.autocomplete.lsp"

[bundles.telescope]
items = ["telescope.nvim", "telescope-ui-select.nvim"]
config = "plugins.ui.telescope"

[treesitter]
auto_install = "prompt"
auto_highlight = ["lua", "python", "toml"]

[config]
plugins_dir = "plugins/"
auto_setup = true
